name: Deploy
run-name: ${{ github.event.workflow_run.display_title }}

on:
  workflow_run:
    workflows: [Build]
    types:
      - completed

# Runs do not need to be concurrent
concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    name: Deploy

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm

      - name: Download Build Artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: vite-dist
          path: dist/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Setup Variables
        id: vars
        shell: bash
        run: |
          cat ./dist/_github_output | tee -a "$GITHUB_OUTPUT"
          rm ./dist/_github_output

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --production=false

      - name: Build Search Index
        if: steps.vars.outputs.event == 'push' && steps.vars.outputs.branch == 'master'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: pnpm run prebuild:search

      - name: Deploy Site
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --branch ${{ case(steps.vars.outputs.event == 'push', steps.vars.outputs.branch, format('pr-{0}', steps.vars.outputs.pr_number)) }}

      - name: Notify Deployment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

          PROJECT_NAME: "discord-userdoccers"

          DEPLOYMENT_ENVIRONMENT: ${{ steps.deploy.outputs.pages-environment }}

          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          DEPLOYMENT_ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url || 'https://docs.discord.food' }}
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.pages-deployment-id }}

          DEPLOYMENT_REF: ${{ steps.vars.outputs.ref }}
          DEPLOYMENT_PR_NUMBER: ${{ steps.vars.outputs.pr_number }}
          DEPLOYMENT_DESCRIPTION: ${{ steps.vars.outputs.description }}
        run: pnpm run ci:deploy
            
