name: Missing Documentation
description: Request documentation for an undocumented endpoint, field, or feature
labels: ["addition"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping expand the docs! Please provide as much detail as you can about what's missing.

        > [!TIP]
        > We are a small team and rely on community contributions to keep this documentation up to date.
        > If you've already done the reverse engineering work, please consider [submitting a pull request](https://github.com/discord-userdoccers/discord-userdoccers/blob/master/CONTRIBUTING.md)! Feel free to contact a maintainer with questions.
  - type: input
    id: subject
    attributes:
      label: Subject
      description: What is missing? (e.g. endpoint name, field, event, enum value)
      placeholder: "e.g. PATCH /channels/{channel.id}/recipients/{user.id}"
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: |
        Provide everything you know about the missing item: request/response structure, fields, behavior, constraints, etc.
        The more detail you provide, the easier it is for us (or a contributor) to document it.
    validations:
      required: true
