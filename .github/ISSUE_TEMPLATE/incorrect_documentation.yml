name: Incorrect Documentation
description: Report inaccurate, outdated, or misleading information in the docs
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping keep the docs accurate! Please provide as much detail as possible so we can verify and fix the issue.

        > [!TIP]
        > We are a small team and rely on community contributions to keep this documentation up to date.
        > If you're able to, please consider [submitting a pull request](https://github.com/discord-userdoccers/discord-userdoccers/blob/master/CONTRIBUTING.md) with a fix — it's often faster than waiting for a maintainer to address it!
  - type: input
    id: page
    attributes:
      label: Affected Page
      description: The page or section where the incorrect information is found.
      placeholder: "e.g. Channel Resource, or a URL"
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current Information
      description: What the documentation currently says.
    validations:
      required: false
  - type: textarea
    id: correct
    attributes:
      label: Correct Information
      description: What it should say instead, with as much detail as possible.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: |
        How did you verify this? Links, screenshots, API responses, or other supporting evidence are very helpful.
    validations:
      required: true
