name: Bug Report
description: Report a problem with the documentation website
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below with as much detail as possible.

        > [!NOTE]
        > This template is for **website bugs** (broken links, rendering issues, UI problems, etc.).
        > If you've found incorrect or missing documentation, please use the appropriate template instead.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Affected Page
      description: The URL of the page where the bug occurs, if applicable.
      placeholder: https://docs.discord.food/...
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your browser and OS, if relevant.
      placeholder: "e.g. Chrome 124 on Windows 11"
    validations:
      required: false
